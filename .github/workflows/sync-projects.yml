name: Auto-Sync Projects

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch repos and update projects.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: xoity
        run: |
          USER_REPOS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/users/$USERNAME/repos?sort=updated&per_page=100" \
            | jq '[.[] | select(.fork == false) | {
              name: .name,
              description: (.description // "No description provided."),
              language: (.language // "Code"),
              topics: (.topics // []),
              stargazers_count: .stargazers_count,
              updated_at: .updated_at,
              html_url: .html_url,
              homepage: (.homepage // "")
            }]')

          INFRA_NINJA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/KalvadTech/infraninja" \
            | jq '[{
              name: .name,
              description: (.description // "No description provided."),
              language: (.language // "Code"),
              topics: (.topics // []),
              stargazers_count: .stargazers_count,
              updated_at: .updated_at,
              html_url: .html_url,
              homepage: (.homepage // "")
            }]')

          jq -s '
            add
            | unique_by(.html_url)
            | map(select(.name != env.USERNAME and .name != "xoity.github.io" and .name != "Projects"))
            | sort_by([
                -(.stargazers_count // 0),
                -((.updated_at // "1970-01-01T00:00:00Z") | fromdateiso8601)
              ])
          ' <(echo "$USER_REPOS") <(echo "$INFRA_NINJA") > projects.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: auto-sync projects"
            git push
          fi
